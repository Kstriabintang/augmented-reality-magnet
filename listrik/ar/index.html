<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>AR Rangkaian Listrik — adindautami</title>
<meta name="description" content="Munculkan rangkaian listrik 3D lewat kamera HP, tanpa marker. Seret memutar, ketuk menyalakan.">
<meta name="theme-color" content="#0a0f1a">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{ --font-d:"Baloo 2","Trebuchet MS",system-ui,sans-serif; --font-b:"Nunito",system-ui,sans-serif; --volt:#f59e0b; --volt2:#ffc655; --green:#22c55e; }
*{box-sizing:border-box} html,body{margin:0;height:100%}
body{font-family:var(--font-b);font-weight:700;background:#0a0f1a;overflow:hidden;-webkit-tap-highlight-color:transparent;overscroll-behavior:none}
#cam{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;background:#0a0f1a}
#stage{position:fixed;inset:0;z-index:1;touch-action:none;cursor:grab}
#stage:active{cursor:grabbing}
.overlay{position:fixed;inset:0;z-index:2;pointer-events:none}
.topbar{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;gap:10px;padding:max(12px,env(safe-area-inset-top)) 14px 12px;
  background:linear-gradient(to bottom,rgba(6,10,20,.65),transparent)}
.topbar>*{pointer-events:auto}
.ic{width:42px;height:42px;border-radius:13px;border:1px solid rgba(255,255,255,.16);background:rgba(16,22,36,.6);backdrop-filter:blur(8px);color:#fff;display:grid;place-items:center;text-decoration:none;cursor:pointer}
.ic svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.seg{display:inline-flex;gap:3px;padding:4px;border-radius:13px;background:rgba(16,22,36,.6);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.14)}
.seg a,.seg button{font-family:var(--font-d);font-weight:800;font-size:13px;color:#c7d3e8;border:0;background:transparent;padding:8px 13px;border-radius:10px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.seg .on{color:#08351a;background:linear-gradient(160deg,#7ef0b0,#22a758)}
.title{margin-left:auto;font-family:var(--font-d);font-weight:800;color:#fff;font-size:15px;text-shadow:0 1px 4px rgba(0,0,0,.5)}
.perm{position:absolute;inset:0;z-index:3;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;color:#dbe6f8;padding:30px;
  background:radial-gradient(120% 120% at 50% 0%,#1a2740,#0a0f1a 70%)}
.perm .spin{width:34px;height:34px;border-radius:50%;border:3px solid rgba(255,255,255,.2);border-top-color:var(--green);animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.perm b{font-family:var(--font-d);font-size:18px;color:#fff}
.hint{position:absolute;left:0;right:0;bottom:calc(104px + env(safe-area-inset-bottom));text-align:center;color:#eaf1fb;font-size:13px;text-shadow:0 1px 4px rgba(0,0,0,.6);padding:0 20px}
.dock{position:absolute;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;gap:14px;
  padding:14px 14px calc(16px + env(safe-area-inset-bottom));background:linear-gradient(to top,rgba(6,10,20,.7),transparent)}
.dock>*{pointer-events:auto}
.round{width:52px;height:52px;border-radius:16px;border:1px solid rgba(255,255,255,.16);background:rgba(16,22,36,.62);backdrop-filter:blur(8px);color:#fff;display:grid;place-items:center;cursor:pointer}
.round svg{width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:2.1;stroke-linecap:round;stroke-linejoin:round}
.dockbtn{display:inline-flex;align-items:center;gap:9px;height:56px;padding:0 26px;border-radius:18px;border:2px solid rgba(255,255,255,.3);cursor:pointer;
  font:800 16.5px var(--font-d);color:#4a2c00;background:linear-gradient(160deg,var(--volt2),var(--volt));box-shadow:0 8px 22px rgba(245,158,11,.4)}
.dockbtn.on{color:#08351a;background:linear-gradient(160deg,#5be08e,#22a758);box-shadow:0 8px 22px rgba(34,167,88,.44)}
.dockbtn svg{width:22px;height:22px}
</style>
<script type="importmap">
{ "imports": { "three": "/vendor/three.module.js", "three/addons/": "/vendor/jsm/" } }
</script>
</head>
<body>
  <video id="cam" playsinline muted autoplay></video>
  <div id="stage"></div>

  <div class="perm" id="perm">
    <div class="spin"></div>
    <b>Menyalakan kamera…</b>
    <div>Izinkan akses kamera untuk memulai AR.</div>
  </div>

  <div class="overlay">
    <div class="topbar">
      <a class="ic" href="/listrik/" aria-label="Kembali"><svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"/></svg></a>
      <div class="seg">
        <button class="on" type="button">Tanpa Marker</button>
        <button type="button" id="markerbtn">Marker</button>
      </div>
      <span class="title">AR Listrik</span>
    </div>

    <div class="hint">Seret untuk memutar · cubit untuk zoom · ketuk untuk nyalakan saklar</div>

    <div class="dock">
      <button class="round" id="reset" type="button" title="Taruh ulang" aria-label="Taruh ulang"><svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg></button>
      <button class="dockbtn" id="toggle" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M13 2L4 14h6l-1 8 9-12h-6l1-8z"/></svg><span>Nyalakan</span></button>
      <button class="round" id="snap" type="button" title="Jepret foto" aria-label="Jepret foto"><svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></button>
    </div>
  </div>

<script>
document.getElementById('markerbtn').addEventListener('click', function(){
  var h=document.querySelector('.hint');
  h.textContent='Mode marker (kartu cetak) segera hadir — gunakan “Tanpa Marker” dulu.';
  clearTimeout(window.__mt); window.__mt=setTimeout(function(){ h.textContent='Seret untuk memutar · cubit untuk zoom · ketuk untuk nyalakan saklar'; }, 3200);
});
</script>
<script type="module" src="/js/listrikAR.js?v=1"></script>
</body>
</html>
